[dev-dependencies]
malus-codegen-gpu = { path = "../malus-codegen-gpu" }
malus-stdlib      = { path = "../malus-stdlib" }

[target.'cfg(target_os = "macos")'.dev-dependencies]
malus-runtime = { path = "../malus-runtime" }
